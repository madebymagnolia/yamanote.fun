<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Yamanote Line</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#191917" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Yamanote" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css?v=16" />
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <div class="ribbon" id="ribbon"></div>

      <!-- loop toggle -->
      <div class="toggle">
        <button id="inner" class="on" type="button">Inner Loop</button>
        <div class="divider"></div>
        <button id="outer" type="button">Outer Loop</button>
      </div>

      <!-- media controls -->
      <div class="controls">
        <button id="prev" class="ctrl skip" type="button" aria-label="Previous station">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18 5v14l-10-7 10-7z" />
            <rect x="6" y="5" width="2.6" height="14" rx="1.1" />
          </svg>
        </button>

        <button id="play" class="ctrl play" type="button" aria-label="Play">
          <svg class="icon-play" width="38" height="38" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5.2v13.6c0 .85.93 1.36 1.64.9l10.5-6.8a1.07 1.07 0 0 0 0-1.8L9.64 4.3A1.07 1.07 0 0 0 8 5.2z" />
          </svg>
          <svg class="icon-pause" width="34" height="34" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="5.5" y="4" width="4.4" height="16" rx="1.4" />
            <rect x="14.1" y="4" width="4.4" height="16" rx="1.4" />
          </svg>
        </button>

        <button id="next" class="ctrl skip" type="button" aria-label="Next station">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M6 5v14l10-7L6 5z" />
            <rect x="15.4" y="5" width="2.6" height="14" rx="1.1" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/stations.js?v=16"></script>
  <script src="js/app.js?v=16"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
